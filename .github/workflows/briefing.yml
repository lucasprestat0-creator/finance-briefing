name: Finance Briefing Quotidien
on:
  schedule:
    - cron: "0 5 * * 1-5"  # voir note ci-dessous sur l'heure
  workflow_dispatch:         # Permet de lancer manuellement
jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Pour pousser les pages GitHub
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Installer les dépendances
        run: pip install anthropic resend json-repair
      - name: Lancer l'agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python agent.py
      - name: Pousser les pages mises à jour
        run: |
          git config user.name "Finance Bot"
          git config user.email "bot@finance-briefing"
          git add docs/
          git diff --staged --quiet || git commit -m "Briefing $(date +'%Y-%m-%d')"
          git push
